steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/github.com/priyamsolanki643-glitch/fp:$COMMIT_SHA', './backend']

  # Step 2: Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/github.com/priyamsolanki643-glitch/fp:$COMMIT_SHA']

  # Step 3: Deploy directly to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'fp'
      - '--image=gcr.io/$PROJECT_ID/github.com/priyamsolanki643-glitch/fp:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--update-env-vars=AI_PROVIDER_KEY=$_AI_PROVIDER_KEY,SYSTEM_REALISM_MODE=BRUTAL_EXPLICIT,PORT=8080'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/github.com/priyamsolanki643-glitch/fp:$COMMIT_SHA'

# Substitutions must be set in the Cloud Build Trigger settings
substitutions:
  _AI_PROVIDER_KEY: ''

